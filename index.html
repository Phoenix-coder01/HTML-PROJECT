<!DOCTYPE html>
<html lang="en">
<head>

<body>
    <h1> Label </h1>
    <form action="/cotact me">
        <label for="email">User Name:</label>
        <input type="text" id="email" lplaceholder="email or username"><br>

        <label for="user_password">Enter Password:</label>
        <input type="password" id="user_password" placeholder="type here"> <br>
        <input type="submit"><hr>

        <h1>
            Date
        </h1>
        Date: <input type="date" name="" id=""><hr>

        <h1>
            file
        </h1>

        File: <input type="file" name="" id=""><br>

        <h1> Colour </h1>
        Colour: <input type="color" name="" id=""><br>

        <h1> Range </h1>
        Price Range <input type="range"><br><hr>    

        <h1>Buttons</h1>

        Poke Me: <input type="button" value="poked" id=""><br>

        Submit <input type="submit" name="" id="">

        <h2>Radio</h2>

        <label for="male">Male:</label>
        <input type="radio" id="male" name="gender" value="male"><br>

        <label for="female">Female:</label>
        <input type="radio" id="female" name="gender" value="female"><br>

        <label for="other">Other:</label>
        <input type="radio" id="other" name="gender" value="other"><br>

        <h2>Check box</h2>
        <label for="Momos"></label>
        Momos<input type="checkbox" name="lang" id="Momos" value="Momos"><br>

        <label for="Pizza"></label>
        Pizza <input type="checkbox" name="lang" id="Pizza" value="Pizza"><br>

        <label for="Burger"></label>
        Burger <input type="checkbox" name="lang" id="Burger" value="Burger"><br>

        <h1> select </h1>

        <label for="country">Choose your Country</label>
        <select name="country" id="country">
            <option value="India">India</option>
            <option value="US">US</option>
            <option value="UK">UK</option>
            <option value="other">other</option>
        </select>

        <h1>Text Area</h1>

        <textarea name="story" id="story" rows="5" cols="20"> 
                please write a story...
        </textarea>

    </form><br><hr>

    <h1> iframe </h1>
